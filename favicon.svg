<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0.3" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#192840"/>
      <stop offset="100%" stop-color="#060c18"/>
    </linearGradient>
  </defs>

  <!-- Background: rounded square for app-icon use -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="12" cy="10" r="1.4" fill="#fff" opacity="0.65"/>
  <circle cx="30" cy="6"  r="1.1" fill="#fff" opacity="0.5"/>
  <circle cx="56" cy="5"  r="0.9" fill="#fff" opacity="0.45"/>
  <circle cx="82" cy="8"  r="1.3" fill="#fff" opacity="0.6"/>
  <circle cx="91" cy="22" r="0.9" fill="#fff" opacity="0.38"/>
  <circle cx="6"  cy="30" r="0.9" fill="#fff" opacity="0.38"/>

  <!-- ── DEER (static snapshot, facing right) ── -->

  <!-- Legs (behind body so body covers the tops) -->
  <rect x="27" y="66" width="5.5" height="24" rx="2.7" fill="#7a4e2e"/>
  <rect x="35" y="66" width="5.5" height="24" rx="2.7" fill="#7a4e2e"/>
  <rect x="52" y="66" width="5.5" height="24" rx="2.7" fill="#7a4e2e"/>
  <rect x="60" y="66" width="5.5" height="24" rx="2.7" fill="#7a4e2e"/>
  <!-- Tiny hooves -->
  <ellipse cx="29.5" cy="90" rx="3.2" ry="1.4" fill="#2e1a0a"/>
  <ellipse cx="37.5" cy="90" rx="3.2" ry="1.4" fill="#2e1a0a"/>
  <ellipse cx="54.5" cy="90" rx="3.2" ry="1.4" fill="#2e1a0a"/>
  <ellipse cx="62.5" cy="90" rx="3.2" ry="1.4" fill="#2e1a0a"/>

  <!-- Body -->
  <ellipse cx="46" cy="58" rx="24" ry="14" fill="#a6724a"/>
  <!-- Belly -->
  <ellipse cx="46" cy="67" rx="17" ry="6.5" fill="#f5e6c4" opacity="0.55"/>

  <!-- White tail / Spiegel -->
  <ellipse cx="19" cy="55" rx="6"  ry="9"  fill="#fff" opacity="0.88"/>

  <!-- Bambi-Flecken -->
  <circle cx="37" cy="49" r="2.2" fill="#fff" opacity="0.6"/>
  <circle cx="47" cy="46" r="1.9" fill="#fff" opacity="0.55"/>
  <circle cx="57" cy="50" r="1.6" fill="#fff" opacity="0.5"/>

  <!-- Neck -->
  <path d="M 62,52 Q 66,39 71,36 L 75,39 Q 70,43 67,54 Z" fill="#a6724a"/>

  <!-- Head (Reh-Profil) -->
  <path d="M 65,22 Q 71,16 80,21 Q 89,26 88,35 Q 87,42 82,43 Q 75,43 71,40 Q 65,35 65,22 Z" fill="#a6724a"/>

  <!-- Cheek highlight -->
  <ellipse cx="75" cy="34" rx="5" ry="4" fill="#c2875f" opacity="0.42"/>

  <!-- Snout -->
  <ellipse cx="86" cy="38" rx="5.5" ry="3.8" fill="#c9956b"/>
  <!-- Nose -->
  <ellipse cx="88.5" cy="37" rx="1.8" ry="1.4" fill="#111"/>
  <circle  cx="89.2" cy="36.4" r="0.7" fill="#fff" opacity="0.65"/>

  <!-- Eye -->
  <circle cx="73" cy="26" r="3.5" fill="#111"/>
  <circle cx="74.2" cy="24.9" r="1.2" fill="#fff"/>

  <!-- Ears (stacked, same position — Reh-Illustrationsstil) -->
  <!-- Back ear -->
  <ellipse cx="66" cy="16" rx="4" ry="9.5"   fill="#8b5a3c" transform="rotate(-10,66,16)"/>
  <!-- Front ear -->
  <ellipse cx="68.5" cy="14" rx="5.5" ry="11.5" fill="#a6724a"  transform="rotate(-7,68.5,14)"/>
  <!-- Inner ear -->
  <ellipse cx="68.5" cy="15" rx="3.3" ry="7.8"  fill="#d48858"  opacity="0.82" transform="rotate(-7,68.5,15)"/>
</svg>
